name: ci-main

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: ZK artifact check
        run: npm run zk:check --workspace apps/zauth-core

      - name: Unit tests
        run: npm test

      - name: Build Docker images
        run: |
          docker build -f apps/zauth-core/Dockerfile -t zauth-core:ci .
          docker build -f apps/zauth-ui/Dockerfile -t zauth-ui:ci .
          docker build -f apps/zauth-notes/Dockerfile -t zauth-notes:ci .
