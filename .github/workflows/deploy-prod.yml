name: deploy-prod

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git fetch --all --prune
            git checkout -f ${{ github.sha }} || (git reset --hard origin/main && git checkout -f ${{ github.sha }})
            printf "%s" "${{ secrets.PROD_ENV_FILE }}" > env/.env.prod
            export COMPOSE_PROJECT_NAME=zauth_prod
            docker container prune -f
            docker compose -f docker/compose.base.yml -f docker/compose.prod.yml --env-file env/.env.prod down --remove-orphans --timeout 30
            docker compose -f docker/compose.base.yml -f docker/compose.prod.yml --env-file env/.env.prod up -d --build
            docker image prune -f
            ./scripts/smoke.sh
